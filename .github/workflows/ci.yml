name: CI
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  eval:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      # Unit tests: metrics, citation detection, adapter loader, HTTP adapter.
      - run: npm test
      # Offline suite: deterministic scorers + regression gate, no API keys.
      - run: npm run eval:ci
