name: Publish Docker image

# Builds the OpenGATE CLI image (CPU-only, multi-arch) and pushes it to Docker
# Hub as pharmatools/opengate. Push a tag like `opengate-docker-0.9.0` and the
# image is built with that version of @pharmatools/opengate baked in, then
# tagged both :0.9.0 and :latest.
#
# One-time setup — add one repository secret (Settings → Secrets → Actions):
#   DOCKERHUB_PHARMATOOLS  a Docker Hub Read & Write access token for the
#                          `pharmatools` account (Account → Security → New token).
# The username is public, so it's hardcoded below rather than stored as a secret.
#
# The version in the tag should match a published npm version of
# @pharmatools/opengate, since the image installs it from npm at build time.

on:
  push:
    tags:
      - 'opengate-docker-*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Version to build, e.g. opengate-docker-0.9.0'
        required: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Resolve version from tag
        id: meta
        run: |
          TAG="${{ github.ref_type == 'tag' && github.ref_name || github.event.inputs.tag }}"
          echo "version=${TAG#opengate-docker-}" >> "$GITHUB_OUTPUT"

      - name: Check credentials are present
        env:
          T: ${{ secrets.DOCKERHUB_PHARMATOOLS }}
        run: |
          [ -n "$T" ] && echo "DOCKERHUB_PHARMATOOLS: set (${#T} chars)" || echo "DOCKERHUB_PHARMATOOLS: EMPTY / not visible to this run"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: pharmatools
          password: ${{ secrets.DOCKERHUB_PHARMATOOLS }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            OPENGATE_VERSION=${{ steps.meta.outputs.version }}
          tags: |
            pharmatools/opengate:${{ steps.meta.outputs.version }}
            pharmatools/opengate:latest
          labels: |
            org.opencontainers.image.version=${{ steps.meta.outputs.version }}
            org.opencontainers.image.revision=${{ github.sha }}
